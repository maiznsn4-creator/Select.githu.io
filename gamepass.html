<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepass Shop | Select Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #e0e5ec;
            --primary: #0088cc;
            --accent: #d35400;
            --shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg); color: #31344b; padding: 15px; }

        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; color: var(--primary); text-decoration: none; }
        .page-title { font-family: 'Moul'; font-size: 14px; color: var(--primary); letter-spacing: 1px; }

        .product-list { display: flex; flex-direction: column; gap: 15px; }
        
        .product-item { 
            background: var(--bg); 
            padding: 18px 20px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 15px;
        }

        .info { flex: 1; }
        .info h4 { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 5px; text-transform: uppercase; }
        .price { color: var(--accent); font-weight: 800; font-size: 16px; }

        .buy-btn { 
            padding: 10px 20px; 
            border-radius: 12px; 
            border: none; 
            background: var(--bg); 
            box-shadow: var(--shadow); 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 12px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:active { box-shadow: var(--inner-shadow); transform: scale(0.95); }

        .footer { text-align: center; margin-top: 40px; font-size: 10px; opacity: 0.4; font-weight: bold; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="Acc.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title">GAMEPASS SHOP</div>
    </div>

    <div class="product-list" id="gamepassList">
        <!-- បញ្ជីទំនិញតម្រៀបពីធំទៅតូច -->
    </div>

    <div class="footer">SELECT STORE PREMIUM &copy; 2026</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8661740556:AAGQ9ACVbloeR0fATqRtmF_dagYArdqMbe0";
        const LOG_GROUP = "-1003370332093";

        // ទិន្នន័យទំនិញ (តម្រៀបតម្លៃពីធំទៅតូច)
        const gamepasses = [
            { name: "Fruit Notifier", price: 18.25 },
            { name: "Dark Blade", price: 8.15 },
            { name: "2x Mastery", price: 3.10 },
            { name: "2x Money", price: 3.10 },
            { name: "+1 Fruit Storage", price: 2.75 },
            { name: "Fast Boats (Good Boat)", price: 2.40 },
            { name: "2x Boss Drops", price: 2.40 }
        ];

        function renderGamepasses() {
            const container = document.getElementById('gamepassList');
            gamepasses.forEach(item => {
                container.innerHTML += `
                    <div class="product-item">
                        <div class="info">
                            <h4>${item.name}</h4>
                            <div class="price">$${item.price.toFixed(2)}</div>
                        </div>
                        <button class="buy-btn" onclick="confirmOrder('${item.name}', ${item.price})">បញ្ជាទិញ</button>
                    </div>
                `;
            });
        }

        async function confirmOrder(name, price) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const { value: qty } = await Swal.fire({
                title: 'បញ្ចូលចំនួន',
                input: 'number',
                inputValue: 1,
                showCancelButton: true,
                confirmButtonColor: '#0088cc',
                inputAttributes: { min: 1 }
            });

            if (qty && qty > 0) {
                const total = (price * qty).toFixed(2);
                Swal.fire({
                    title: 'បញ្ជាក់ការទិញ',
                    html: `<div style="text-align:left; font-size:14px;">
                            ទំនិញ: <b>${name}</b><br>
                            ចំនួន: <b>${qty}</b><br>
                            សរុប: <b style="color:#d35400;">$${total}</b>
                           </div>`,
                    showCancelButton: true,
                    confirmButtonText: 'យល់ព្រម',
                    confirmButtonColor: '#22c55e'
                }).then(res => {
                    if (res.isConfirmed) sendOrder(name, qty, total);
                });
            }
        }

        function sendOrder(name, qty, total) {
            const user = tg.initDataUnsafe.user;
            const msg = `🛒 **ការបញ្ជាទិញ GAMEPASS**\n━━━━━━━━━━━━━━━━\n👤 អ្នកទិញ: ${user ? user.first_name : 'Unknown'}\n🆔 ID: \`${user ? user.id : 'N/A'}\`\n📦 ទំនិញ: ${name}\n🔢 ចំនួន: ${qty}\n💰 សរុប: $${total}\n━━━━━━━━━━━━━━━━`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: LOG_GROUP, text: msg, parse_mode: 'Markdown' })
            });

            Swal.fire('ជោគជ័យ!', 'ព័ត៌មានផ្ញើទៅ Admin រួចរាល់', 'success').then(() => {
                window.open(`https://t.me/Im_sal88?text=${encodeURIComponent("សួស្ដី Admin! ខ្ញុំចង់ទិញ Gamepass:\n- " + name + "\n- ចំនួន: " + qty + "\n- សរុប: $" + total)}`, '_blank');
            });
        }

        renderGamepasses();
    </script>
</body>
</html>
