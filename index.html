<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Store | Premium Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #31344b;
            --primary: #0088cc;
            --accent: #d35400;
            --shadow-raised: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --shadow-pressed: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; scroll-behavior: smooth; }

        /* Welcome Screen */
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .verify-box { background: var(--bg-color); padding: 40px 20px; border-radius: 30px; box-shadow: var(--shadow-raised); max-width: 400px; width: 100%; }
        .v-icon { font-size: 50px; color: var(--primary); margin-bottom: 20px; animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .welcome-btn { background: var(--bg-color); color: var(--primary); border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 25px; width: 100%; box-shadow: var(--shadow-raised); }
        .welcome-btn:active { box-shadow: var(--shadow-pressed); }

        /* Main App */
        #main-app { display: none; padding-bottom: 50px; }
        header { background: var(--bg-color); padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(163,177,198,0.3); border-radius: 0 0 25px 25px; }
        
        .user-profile { display: flex; align-items: center; gap: 12px; background: var(--bg-color); padding: 10px; border-radius: 20px; box-shadow: var(--shadow-pressed); margin-bottom: 10px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; box-shadow: var(--shadow-raised); border: 2px solid #fff; }
        .user-name { font-weight: 700; font-size: 13px; color: var(--primary); }

        .category-nav { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; }
        .category-nav::-webkit-scrollbar { display: none; }
        .nav-item { background: var(--bg-color); box-shadow: var(--shadow-raised); padding: 10px 18px; border-radius: 12px; white-space: nowrap; font-size: 10px; font-weight: 700; border: none; cursor: pointer; }
        .nav-item:active { box-shadow: var(--shadow-pressed); color: var(--primary); }

        .container { padding: 10px 15px; }
        .section-header { margin: 20px 0 10px; }
        .section-title { font-family: 'Moul', serif; font-size: 12px; color: var(--accent); }

        /* Item Card */
        .item-card { background: var(--bg-color); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: var(--shadow-raised); display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-name { font-size: 12px; font-weight: 600; color: var(--text-color); line-height: 1.4; }
        .item-price { color: var(--primary); font-weight: 800; font-size: 18px; margin-top: 5px; }
        .btn-buy { background: var(--bg-color); color: var(--primary); border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; box-shadow: var(--shadow-raised); cursor: pointer; }
        .btn-buy:active { box-shadow: var(--shadow-pressed); }

        .help-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--bg-color); box-shadow: var(--shadow-raised); padding: 15px; border-radius: 15px; text-decoration: none; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .help-btn:active { box-shadow: var(--shadow-pressed); }
        footer { text-align: center; font-size: 9px; opacity: 0.5; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="verify-box">
        <i class="fas fa-user-check v-icon"></i>
        <h1 style="font-family:'Moul'; font-size:18px;">SELECT STORE</h1>
        <p style="font-size:11px; opacity:0.7; margin-top:5px;">សូមចុចប៊ូតុងខាងក្រោមដើម្បីផ្ទៀងផ្ទាត់ Identity</p>
        <button class="welcome-btn" onclick="openApp()">START VERIFY ✅</button>
    </div>
</div>

<div id="main-app">

            <div>
                <div id="u-name" class="user-name">Telegram User</div>
                <div style="font-size:9px; color:#2ecc71; font-weight:700;">Account Verified <i class="fas fa-check-double"></i></div>
            </div>
        </div>
        <div style="font-family:'Moul'; text-align:center; font-size:14px;">SELECT STORE</div>
    </header>

    <div class="category-nav">
        <button class="nav-item" onclick="scrollToSec('fruits')">FRUITS</button>
        <button class="nav-item" onclick="scrollToSec('starter')">STARTER</button>
        <button class="nav-item" onclick="scrollToSec('special')">SPECIAL</button>
        <button class="nav-item" onclick="scrollToSec('v4')">RACE V4</button>
        <button class="nav-item" onclick="scrollToSec('sailor')">SAILOR</button>
        <button class="nav-item" onclick="scrollToSec('aov')">AOV</button>
        <button class="nav-item" onclick="scrollToSec('anime')">ANIME</button>
    </div>

    <div class="container" id="product-list"></div>

    <div class="container">
        <a href="https://t.me/Im_RA12" class="help-btn">
            <i class="fab fa-telegram"></i> ទាក់ទងជំនួយការ @Im_RA12
        </a>
        <footer>SELECT STORE PREMIUM &copy; 2026</footer>
    </div>
</div>

    function openApp() {
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            if(user.photo_url) document.getElementById('u-avatar').src = user.photo_url;
        }
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${LOG_ID}&text=${encodeURIComponent('IDENTITY VERIFIED: ' + (user ? user.first_name : 'Unknown'))}`);
        
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        render();
    }

    function render() {
        const list = document.getElementById('product-list');
        list.innerHTML = database.map(sec => `
            <div id="${sec.id}">
                <div class="section-header"><span class="section-title">${sec.title}</span></div>
                ${sec.items.map(i => `
                    <div class="item-card">
                        <div class="item-info">
                            <div class="item-name">${i.n}</div>
                            <div class="item-price">$${i.p.toFixed(2)}</div>
                        </div>
                        <button class="btn-buy" onclick="order('${i.n}', ${i.p})">ទិញ</button>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function scrollToSec(id) {
        const el = document.getElementById(id);
        window.scrollTo({ top: el.offsetTop - 140, behavior: 'smooth' });
    }

    function order(name, price) {
        const user = tg.initDataUnsafe.user || { first_name: 'អតិថិជន' };
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${LOG_ID}&text=${encodeURIComponent('ORDER: ' + name + ' | BY: ' + user.first_name)}`);

        Swal.fire({
            title: 'បញ្ជាក់ការទិញ',
            text: `តើអ្នកចង់ទិញ "${name}" មែនទេ?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'បាទ/ចាស',
            cancelButtonText: 'បោះបង់',
            confirmButtonColor: '#0088cc',
            background: '#e0e5ec',
            color: '#31344b'
        }).then(res => {
            if(res.isConfirmed) {
                const text = encodeURIComponent(`សួស្ដី Admin! ខ្ញុំគឺ ${user.first_name} ចង់ទិញទំនិញ៖\n\n🔹 ទំនិញ៖ ${name}\n💵 តម្លៃ៖ $${price.toFixed(2)}\n\nសូម Admin ជួយឆែកមើលផង បាទ/ចាស!`);
                window.open(`https://t.me/${ADMIN_ORDER}?text=${text}`);
            }
        });
    }
</script>
</body>
</html>
