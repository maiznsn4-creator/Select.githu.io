<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Store | Identity Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #e0e5ec;
            --primary: #0088cc;
            --shadow: 9px 9px 18px #a3b1c6, -9px -9px 18px #ffffff;
            --inner-shadow: inset 6px 6px 12px #a3b1c6, inset -6px -6px 12px #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg); color: #31344b; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: var(--bg); border-radius: 35px; padding: 30px; box-shadow: var(--shadow); text-align: center; }
        
        .logo-box { width: 80px; height: 80px; background: var(--bg); border-radius: 50%; box-shadow: var(--shadow); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--primary); }
        
        h2 { font-family: 'Moul'; font-size: 18px; margin-bottom: 10px; color: var(--primary); }
        p { font-size: 12px; opacity: 0.7; margin-bottom: 25px; }

        .verify-btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: var(--bg); box-shadow: var(--shadow); 
            font-weight: bold; color: var(--primary); cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .verify-btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }

        #store-menu { display: none; width: 100%; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { 
            background: var(--bg); padding: 20px; border-radius: 20px; 
            box-shadow: var(--shadow); text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-item i { font-size: 25px; color: var(--primary); }
        .menu-item span { font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- ផ្នែកផ្ទៀងផ្ទាត់ -->
    <div class="card" id="verify-box">
        <div class="logo-box"><i class="fas fa-user-shield"></i></div>
        <h2>ផ្ទៀងផ្ទាត់ចូលប្រើប្រាស់</h2>
        <p>សូមចុចប៊ូតុងខាងក្រោមដើម្បីផ្ទៀងផ្ទាត់អត្តសញ្ញាណ និងចូលទៅកាន់ហាងទំនិញ!</p>
        
        <button class="verify-btn" onclick="directVerify()">
            <i class="fas fa-check-circle"></i> ផ្ទៀងផ្ទាត់ឥឡូវនេះ
        </button>
    </div>

    <!-- ផ្នែកមឺនុយមេ -->
    <div id="store-menu">
        <div class="card">
            <h2 style="margin-bottom: 20px;">មឺនុយហាង</h2>
            <div class="menu-grid">
                <a href="Acc.html" class="menu-item">
                    <i class="fas fa-user-circle"></i>
                    <span>ACCOUNT</span>
                </a>
                <a href="gamepass.html" class="menu-item">
                    <i class="fas fa-ticket-alt"></i>
                    <span>GAMEPASS</span>
                </a>
                <a href="fruit.html" class="menu-item">
                    <i class="fas fa-apple-alt"></i>
                    <span>FRUIT</span>
                </a>
                <a href="perm.html" class="menu-item">
                    <i class="fas fa-gem"></i>
                    <span>PERM FRUIT</span>
                </a>
            </div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd; opacity: 0.3;">
            <p style="margin-bottom: 0;">SELECT STORE PREMIUM &copy; 2026</p>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ពិនិត្យមើលថាធ្លាប់ Verify ហើយឬនៅ
    if (sessionStorage.getItem('isVerified') === 'true') {
        document.getElementById('verify-box').style.display = 'none';
        document.getElementById('store-menu').style.display = 'block';
    }

    function directVerify() {
        const user = tg.initDataUnsafe.user;

        if (!user) {
            Swal.fire('កំហុស', 'សូមបើកកម្មវិធីនេះនៅក្នុង Telegram!', 'error');
            return;
        }

        // បង្ហាញ Animation ពេលកំពុងផ្ទៀងផ្ទាត់
        Swal.fire({
            title: 'កំពុងផ្ទៀងផ្ទាត់...',
            timer: 1000,
            didOpen: () => { Swal.showLoading(); }
        }).then(() => {
            // បើកមឺនុយហាង
            document.getElementById('verify-box').style.display = 'none';
            document.getElementById('store-menu').style.display = 'block';
            
            // រក្សាទុកស្ថានភាព
            sessionStorage.setItem('isVerified', 'true');
            
            // រំញ័រទូរស័ព្ទតិចៗ
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });
    }
</script>

</body>
</html>
