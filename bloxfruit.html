<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruit Shop | Select Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #e0e5ec;
            --primary: #0088cc;
            --accent: #d35400;
            --shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg); color: #31344b; padding: 15px; }

        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; color: var(--primary); text-decoration: none; }
        .page-title { font-family: 'Moul'; font-size: 14px; color: var(--primary); }

        /* Category Title */
        .category-title {
            font-family: 'Moul';
            font-size: 12px;
            background: #cbd5e0;
            padding: 8px 15px;
            border-radius: 10px;
            margin: 20px 0 10px;
            color: #2d3748;
            box-shadow: var(--inner-shadow);
        }

        .product-list { display: flex; flex-direction: column; gap: 12px; }
        
        .product-item { 
            background: var(--bg); 
            padding: 12px 15px; 
            border-radius: 18px; 
            box-shadow: var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 10px;
        }

        .info { flex: 1; }
        .info h4 { font-size: 11px; font-weight: 700; color: #444; line-height: 1.4; margin-bottom: 3px; }
        .price { color: var(--accent); font-weight: 800; font-size: 14px; }

        .buy-btn { 
            padding: 8px 12px; 
            border-radius: 10px; 
            border: none; 
            background: var(--bg); 
            box-shadow: var(--shadow); 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 11px; 
            cursor: pointer;
            white-space: nowrap;
        }
        .buy-btn:active { box-shadow: var(--inner-shadow); color: var(--accent); }

        .footer { text-align: center; margin: 30px 0; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="Acc.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title">ទិញអាខោន BLOX FRUIT</div>
    </div>

    <!-- ក្រុមទី ១: អាខោនកម្រិតខ្ពស់ (High-End) -->
    <div class="category-title"><i class="fas fa-crown"></i> អាខោន VIP & HIGH-END</div>
    <div class="product-list" id="high-end-list"></div>

    <!-- ក្រុមទី ២: អាខោនមធ្យម (Mid-Range) -->
    <div class="category-title"><i class="fas fa-star"></i> អាខោនពេញនិយម</div>
    <div class="product-list" id="mid-range-list"></div>

    <!-- ក្រុមទី ៣: អាខោនតម្លៃសមរម្យ (Budget) -->
    <div class="category-title"><i class="fas fa-tag"></i> អាខោនតម្លៃសមរម្យ</div>
    <div class="product-list" id="budget-list"></div>

    <div class="footer">SELECT STORE PREMIUM &copy; 2026</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8661740556:AAGQ9ACVbloeR0fATqRtmF_dagYArdqMbe0";
        const LOG_GROUP = "-1003370332093";

        // ទិន្នន័យតម្រៀបពីធំទៅតូច និងបែងចែកក្រុម
        const highEnd = [
            { name: "LV 2800 + God + CDK + 6V4 Full Gear (គ្រប់ Race)", price: 5.70 },
            { name: "LV 2800 + God + CDK + SGT Draco FG V4", price: 5.20 },
            { name: "LV 2800 + God + CDK + SGT + Draco V4 + Mele New", price: 4.30 },
            { name: "Kitsune Inventory + Random Mythic (Global)", price: 3.50 },
            { name: "LV 2800 + God + Draco V4 FG", price: 3.30 }
        ];

        const midRange = [
            { name: "LV 2550 + God + CDK + Soul Guitar + Leopard (ញ៉ាំរួច)", price: 2.50 },
            { name: "LV 2800 + God + CDK + Fish Full Gear V4", price: 2.30 },
            { name: "LV 2800 + God + CDK + Mink Full Gear V4 + Dough v2", price: 2.30 },
            { name: "LV 2800 + God + CDK + Sky Full Gear V4 + Dough v2", price: 2.30 },
            { name: "LV 2800 + God + CDK + Ghoul Full Gear V4", price: 2.30 },
            { name: "LV 2800 + God + CDK + Cyborg Full Gear V4 + Dough v2", price: 2.30 },
            { name: "LV 2800 + God + CDK + SGT + V4 Cyborg (VIP)", price: 2.10 },
            { name: "LV 2800 + God + CDK + Cyborg V4 Full Gear T10", price: 2.00 },
            { name: "LV 2550 + God + CDK + Soul Guitar + T-REX Inventory", price: 1.70 },
            { name: "LV 2550 + God + CDK + Soul Guitar + Dough + Lever Gạt", price: 1.70 },
            { name: "LV 2800 + God + CDK + Human V4 Full Gear", price: 1.70 },
            { name: "LV 2800 + God + 100% CDK + 100% V4 Sky/Fish", price: 1.70 }
        ];

        const budget = [
            { name: "LV 2800 + God + Tiger Inventory (Global - Live 1h)", price: 1.35 },
            { name: "LV 2800 + God + Yeti (Global - Live 3 Days)", price: 1.35 },
            { name: "LV 2800 + God + CDK + Mirror + Valk (Live 72h)", price: 1.30 },
            { name: "LV 2800 + God + Venom Inventory (Global - Live 1h)", price: 1.20 },
            { name: "LV 2800 + God + Dough Inventory (Live 72h)", price: 1.15 },
            { name: "LV 2750 + God + Gas Inventory (Live 3 Days)", price: 1.10 },
            { name: "LV 2800 + God + T-Rex Inventory (Live 72h)", price: 1.05 },
            { name: "LV 2800 + God + Mammoth (Global - Live 72h)", price: 1.00 },
            { name: "LV 2800 + Godhuman (Global - Live 72h)", price: 0.80 },
            { name: "Mythical Fruits Random 1-4 Fruit (Live 1h)", price: 0.80 },
            { name: "LV 1500 - 2550 + Tỉ Lệ Ra Mythic Fruit (Live 24h)", price: 0.65 },
            { name: "LV 1500 - 2000 + Beli Ngon (Global - Live 24h)", price: 0.60 }
        ];

        function renderList(data, elementId) {
            const container = document.getElementById(elementId);
            data.forEach(p => {
                container.innerHTML += `
                    <div class="product-item">
                        <div class="info">
                            <h4>${p.name}</h4>
                            <div class="price">$${p.price.toFixed(2)}</div>
                        </div>
                        <button class="buy-btn" onclick="startOrder('${p.name}', ${p.price})">ទិញ</button>
                    </div>
                `;
            });
        }

        async function startOrder(name, price) {
            const { value: qty } = await Swal.fire({
                title: 'បញ្ចូលចំនួន',
                input: 'number',
                inputValue: 1,
                showCancelButton: true,
                confirmButtonColor: '#0088cc',
                inputAttributes: { min: 1 }
            });

            if (qty && qty > 0) {
                const total = (price * qty).toFixed(2);
                Swal.fire({
                    title: 'បញ្ជាក់ការទិញ',
                    html: `<div style="text-align:left; font-size:13px;">📦 <b>ទំនិញ:</b> ${name}<br>🔢 <b>ចំនួន:</b> ${qty}<br>💰 <b>សរុប:</b> $${total}</div>`,
                    showCancelButton: true,
                    confirmButtonText: 'យល់ព្រម',
                    confirmButtonColor: '#22c55e'
                }).then(res => {
                    if (res.isConfirmed) executeOrder(name, qty, total);
                });
            }
        }

        function executeOrder(name, qty, total) {
            const user = tg.initDataUnsafe.user;
            const msg = `🛒 **ការបញ្ជាទិញថ្មី (Blox Fruit)**\n━━━━━━━━━━━━━━━━\n👤 អ្នកទិញ: ${user ? user.first_name : 'Unknown'}\n🆔 ID: \`${user ? user.id : 'N/A'}\`\n📦 ទំនិញ: ${name}\n🔢 ចំនួន: ${qty}\n💰 សរុប: $${total}\n━━━━━━━━━━━━━━━━`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: LOG_GROUP, text: msg, parse_mode: 'Markdown' })
            });

            Swal.fire('ជោគជ័យ!', 'ព័ត៌មានផ្ញើទៅប្រព័ន្ធរួចរាល់', 'success').then(() => {
                window.open(`https://t.me/Im_sal88?text=${encodeURIComponent("សួស្ដី Admin! ខ្ញុំចង់ទិញ:\n- " + name + "\n- ចំនួន: " + qty + "\n- សរុប: $" + total)}`, '_blank');
            });
        }

        renderList(highEnd, 'high-end-list');
        renderList(midRange, 'mid-range-list');
        renderList(budget, 'budget-list');
    </script>
</body>
</html>
