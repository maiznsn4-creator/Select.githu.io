<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow A Garden | Select Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #e0e5ec;
            --primary: #0088cc;
            --shadow: 7px 7px 14px #a3b1c6, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg); color: #31344b; padding: 15px; }

        /* Header */
        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; color: var(--primary); text-decoration: none; }
        .page-title { font-family: 'Moul'; font-size: 14px; color: #2d3436; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: var(--bg); padding: 15px; border-radius: 25px; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; text-align: center; }

        .img-container { width: 100%; aspect-ratio: 1/1; background: var(--bg); border-radius: 20px; box-shadow: var(--inner-shadow); margin-bottom: 12px; padding: 12px; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }

        .product-card h4 { font-size: 11px; margin-bottom: 5px; font-weight: 700; color: #444; min-height: 32px; }
        .price-tag { color: #d35400; font-weight: 800; font-size: 15px; margin-bottom: 12px; }

        .buy-now { width: 100%; padding: 10px; border-radius: 15px; border: none; background: var(--bg); box-shadow: var(--shadow); color: var(--primary); font-weight: bold; font-size: 11px; cursor: pointer; }
        .buy-now:active { box-shadow: var(--inner-shadow); color: #e67e22; }

        /* Custom SweetAlert Popup Style */
        .swal2-popup { border-radius: 30px !important; background: var(--bg) !important; box-shadow: var(--shadow) !important; }
        .swal2-title { color: var(--primary) !important; font-family: 'Moul' !important; font-size: 16px !important; }
        .swal2-input { box-shadow: var(--inner-shadow) !important; border: none !important; border-radius: 15px !important; background: var(--bg) !important; text-align: center !important; }
        .swal2-confirm { border-radius: 15px !important; padding: 10px 25px !important; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="Acc.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="page-title">GROW A GARDEN</div>
    </div>

    <div class="product-grid">
        <!-- ទំនិញទី ១ -->
        <div class="product-card">
            <div class="img-container"><img src="1.png"></div>
            <h4>Candy 165Q</h4>
            <div class="price-tag">$0.70</div>
            <button class="buy-now" onclick="startOrder('អាខោនស្ករគ្រាប់ Candy 165Q', 0.70)">បញ្ជាទិញ</button>
        </div>

        <!-- ទំនិញទី ២ -->
        <div class="product-card">
            <div class="img-container"><img src="1.png"></div>
            <h4>Candy 837T</h4>
            <div class="price-tag">$0.70</div>
            <button class="buy-now" onclick="startOrder('អាខោនស្ករគ្រាប់ Candy 837T', 0.70)">បញ្ជាទិញ</button>
        </div>

        <!-- ទំនិញទី ៣ -->
        <div class="product-card" style="grid-column: span 2; width: 60%; margin: 0 auto;">
            <div class="img-container"><img src="1.png"></div>
            <h4>CORR Kitsune</h4>
            <div class="price-tag">$1.60</div>
            <button class="buy-now" onclick="startOrder('អាខោនសត្វកម្រ CORR Kitsune', 1.60)">បញ្ជាទិញ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ព័ត៌មាន Bot និង Group របស់បង
        const BOT_TOKEN = "8661740556:AAGQ9ACVbloeR0fATqRtmF_dagYArdqMbe0";
        const LOG_GROUP = "-1003370332093";

        async function startOrder(name, price) {
            // ១. ផ្ទាំងរើសចំនួន
            const { value: quantity } = await Swal.fire({
                title: 'ជ្រើសរើសចំនួន',
                input: 'number',
                inputPlaceholder: 'បញ្ចូលចំនួន...',
                inputValue: 1,
                showCancelButton: true,
                confirmButtonText: 'បន្តទៅមុខ',
                cancelButtonText: 'បោះបង់',
                inputAttributes: { min: 1, step: 1 },
                confirmButtonColor: '#0088cc'
            });

            if (quantity && quantity > 0) {
                const total = (price * quantity).toFixed(2);
                
                // ២. ផ្ទាំងបញ្ជាក់ការទិញ
                Swal.fire({
                    title: 'ផ្ទៀងផ្ទាត់ការទិញ',
                    html: `
                        <div style="text-align: left; padding: 12px; background: #f0f3f7; border-radius: 15px; box-shadow: inset 3px 3px 6px #cfd2d6, inset -3px -3px 6px #ffffff;">
                            <p>📦 <b>ទំនិញ:</b> ${name}</p>
                            <p>🔢 <b>ចំនួន:</b> ${quantity}</p>
                            <hr style="margin: 10px 0; border: 0.5px solid #ccc;">
                            <p>💰 <b>សរុប:</b> <span style="color: #d35400; font-weight: 800;">$${total}</span></p>
                        </div>
                    `,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'យល់ព្រមទិញ',
                    cancelButtonText: 'បោះបង់',
                    confirmButtonColor: '#22c55e'
                }).then((result) => {
                    if (result.isConfirmed) {
                        executeOrder(name, quantity, total);
                    }
                });
            }
        }

        function executeOrder(name, qty, total) {
            const user = tg.initDataUnsafe.user;
            const message = `🛒 **ការបញ្ជាទិញថ្មី (Grow A Garden)**\n━━━━━━━━━━━━━━━━\n👤 អ្នកទិញ: ${user ? user.first_name : 'Unknown'}\n🆔 ID: \`${user ? user.id : 'N/A'}\`\n📦 ទំនិញ: ${name}\n🔢 ចំនួន: ${qty}\n💰 សរុប: $${total}\n━━━━━━━━━━━━━━━━`;

            // ផ្ញើទៅកាន់ Group បង
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: LOG_GROUP, text: message, parse_mode: 'Markdown' })
            });

            // លោតផ្ទាំងជោគជ័យ
            Swal.fire({
                icon: 'success',
                title: 'ជោគជ័យ!',
                text: 'សូមបន្តទៅកាន់ Telegram Admin ដើម្បីទូទាត់ប្រាក់',
                confirmButtonText: 'ទៅកាន់ Telegram'
            }).then(() => {
                const adminChat = `https://t.me/Im_sal88?text=${encodeURIComponent("សួស្ដី Admin! ខ្ញុំបានកក់ទិញ:\n- " + name + "\n- ចំនួន: " + qty + "\n- តម្លៃសរុប: $" + total)}`;
                window.open(adminChat, '_blank');
            });
        }
    </script>
</body>
</html>
